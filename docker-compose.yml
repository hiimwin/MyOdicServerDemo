services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: oidc-api
    ports:
      - "5000:5000"
    networks:
      - oidc-net

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: oidc-client
    ports:
      - "5001:80"
    networks:
      - oidc-net
    depends_on:
      - api

networks:
  oidc-net:
    driver: bridge